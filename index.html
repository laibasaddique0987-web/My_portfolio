<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ IMPORTANT for Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fruit Cards</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
  <h2 class="text-center mb-4">Fresh Fruits</h2>

  <div class="row">

    <!-- Apple -->
    <div class="col-12 col-sm-6 col-lg-3 mb-4">
      <div class="card custom-card">
        <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Apple</h5>
          <p class="card-text">Apple sehat ke liye bohat faidemand hai aur roz khana chahiye.</p>
          <a href="#" class="btn btn-danger">Buy Now</a>
        </div>
      </div>
    </div>

    <!-- Banana -->
    <div class="col-12 col-sm-6 col-lg-3 mb-4">
      <div class="card custom-card">
        <img src="banana.svg.jpg" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Banana</h5>
          <p class="card-text">Banana instant energy deta hai aur body ke liye acha hai.</p>
          <a href="#" class="btn btn-warning">Buy Now</a>
        </div>
      </div>
    </div>

    <!-- Mango -->
    <div class="col-12 col-sm-6 col-lg-3 mb-4">
      <div class="card custom-card">
        <img src="mango-svg.jpg" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Mango</h5>
          <p class="card-text">Mango Pakistan ka sab se pasandida fruit hai.</p>
          <a href="#" class="btn btn-success">Buy Now</a>
        </div>
      </div>
    </div>

    <!-- Orange -->
    <div class="col-12 col-sm-6 col-lg-3 mb-4">
      <div class="card custom-card">
        <img src="orange.svg.jpg" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Orange</h5>
          <p class="card-text">Orange vitamin C se bharpoor hota hai.</p>
          <a href="#" class="btn btn-primary">Buy Now</a>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
